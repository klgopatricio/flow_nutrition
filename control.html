<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Flow Nutrition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a3a2a;
      color: #f5f0e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #162d20;
      border-bottom: 1px solid rgba(245,240,232,.1);
      flex-shrink: 0;
    }

    .header__brand {
      font-size: .95rem;
      font-weight: 500;
      letter-spacing: .06em;
      color: #f5f0e8;
    }
    .header__brand span { color: #3d6b50; font-style: italic; }

    .header__label {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(245,240,232,.45);
    }

    .header__link {
      font-size: .78rem;
      color: rgba(245,240,232,.55);
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid rgba(245,240,232,.15);
      border-radius: 999px;
      transition: color .2s, border-color .2s;
    }
    .header__link:hover { color: #f5f0e8; border-color: rgba(245,240,232,.4); }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <header>
    <div class="header__brand">Flow <span>Nutrition</span></div>
    <div class="header__label">Control interno</div>
    <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQRuMmSX0TjJLY0mmajeRf_nbodrRi_7tuKmZzkLWJagqquLQhsaI7q6-iz816kig/pubhtml"
       target="_blank" rel="noopener" class="header__link">
      Abrir en Google Sheets ↗
    </a>
  </header>

  <iframe
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQRuMmSX0TjJLY0mmajeRf_nbodrRi_7tuKmZzkLWJagqquLQhsaI7q6-iz816kig/pubhtml"
    title="Control Flow Nutrition"
    loading="lazy"
  ></iframe>

</body>
</html>
